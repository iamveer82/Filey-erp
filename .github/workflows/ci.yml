name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (not ci): the lockfile is generated on Windows and
      # can't carry the linux-only optional native/wasm deps (rolldown /
      # @tailwindcss oxide / lightningcss pull @emnapi/*), which makes
      # `npm ci` abort with "missing from lock file" on the linux runner.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
